<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Cabin OS</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .hours-form-grid {
      display:grid; grid-template-columns: auto 1fr 1fr;
      gap:.35rem .5rem; align-items:center; font-size:.85rem; margin-bottom:.75rem;
    }
    .hours-form-grid label { color:var(--text-muted); text-transform:capitalize; }
    .hours-form-grid input[type=time] { padding:.3rem .5rem; font-size:.85rem; }
    .hours-form-grid input[type=checkbox] { width:1.1rem; height:1.1rem; }
    .months-grid {
      display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:.75rem;
    }
    .month-chip {
      padding:.25rem .6rem; border-radius:99px; border:1.5px solid var(--tan-dark);
      font-size:.8rem; cursor:pointer; user-select:none; background:#fff;
    }
    .month-chip.selected { background:var(--green-mid); color:#fff; border-color:var(--green-mid); }
  </style>
</head>
<body>
  <nav id="nav">
    <a href="/" class="nav-brand">Cabin OS</a>
    <div class="nav-links">
      <a href="/pages/wiki/">Wiki</a>
      <a href="/pages/shutdown/">Shutdown</a>
      <a href="/pages/photos/">Photos</a>
      <a href="/pages/contacts/">Contacts</a>
      <a href="/pages/businesses/">Businesses</a>
      <a href="/pages/settings/">Settings</a>
    </div>
  </nav>
  <main>
    <h1 class="page-title">Settings</h1>

    <!-- Videos -->
    <div class="section-label">Wiki videos</div>
    <div class="card">
      <ul id="videos-list" class="contact-list"></ul>
      <form id="add-video-form" style="display:flex;flex-direction:column;gap:.5rem;margin-top:1rem">
        <input type="text" id="new-video-title" placeholder="Title" required>
        <input type="url" id="new-video-url" placeholder="YouTube URL" required>
        <input type="text" id="new-video-category" placeholder="Category (optional)">
        <input type="text" id="new-video-notes" placeholder="Notes (optional)">
        <button type="submit" class="btn btn-primary">Add video</button>
      </form>
    </div>

    <!-- Businesses -->
    <div class="section-label">Businesses</div>
    <div class="card">
      <ul id="businesses-list" class="contact-list"></ul>
      <details style="margin-top:1rem">
        <summary style="cursor:pointer;font-weight:600;color:var(--green-dark)">+ Add business</summary>
        <form id="add-business-form" style="display:flex;flex-direction:column;gap:.5rem;margin-top:.75rem">
          <input type="text" id="biz-name" placeholder="Name" required>
          <input type="text" id="biz-category" placeholder="Category (e.g. Food, Hardware)">
          <textarea id="biz-description" placeholder="Description" style="min-height:60px"></textarea>
          <input type="text" id="biz-address" placeholder="Address">
          <input type="tel" id="biz-phone" placeholder="Phone">
          <input type="url" id="biz-website" placeholder="Website URL">

          <div style="font-size:.85rem;font-weight:600;margin-top:.25rem">Hours (leave blank = closed that day)</div>
          <div class="hours-form-grid" id="hours-form"></div>

          <div style="font-size:.85rem;font-weight:600">Closed months</div>
          <div class="months-grid" id="months-form"></div>

          <button type="submit" class="btn btn-primary">Save business</button>
        </form>
      </details>
    </div>

    <!-- Photo categories -->
    <div class="section-label">Photo categories</div>
    <div class="card">
      <ul id="categories-list" class="contact-list"></ul>
      <form id="add-category-form" style="display:flex;gap:.5rem;margin-top:1rem">
        <input type="text" id="new-category-label" placeholder="New category label" required style="flex:1">
        <button type="submit" class="btn btn-primary">Add</button>
      </form>
    </div>

    <!-- Checklist items -->
    <div class="section-label">Checklist items</div>
    <div class="card">
      <ul id="checklist-items-list" class="contact-list"></ul>
      <form id="add-item-form" style="display:flex;gap:.5rem;margin-top:1rem;flex-wrap:wrap">
        <input type="text" id="new-item-label" placeholder="Item label" required style="flex:2;min-width:140px">
        <input type="text" id="new-item-section" placeholder="Section" required style="flex:1;min-width:120px">
        <button type="submit" class="btn btn-primary">Add</button>
      </form>
    </div>

  </main>

  <script src="/assets/app.js" type="module"></script>
  <script type="module">
    const DAYS = ['mon','tue','wed','thu','fri','sat','sun'];
    const DAY_LABELS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function requireAuth() {
      if (!CabinOS.getToken()) { CabinOS.showAuthModal(() => {}); return false; }
      return true;
    }

    // ── Build hours form ──
    const hoursForm = document.getElementById('hours-form');
    DAYS.forEach((d, i) => {
      hoursForm.innerHTML += `
        <label>${DAY_LABELS[i]}</label>
        <input type="time" id="h-open-${d}" placeholder="Open">
        <input type="time" id="h-close-${d}" placeholder="Close">`;
    });

    function readHours() {
      const hours = {};
      DAYS.forEach(d => {
        const open = document.getElementById(`h-open-${d}`).value;
        const close = document.getElementById(`h-close-${d}`).value;
        if (open && close) hours[d] = { open, close };
      });
      return hours;
    }

    function resetHours() {
      DAYS.forEach(d => {
        document.getElementById(`h-open-${d}`).value = '';
        document.getElementById(`h-close-${d}`).value = '';
      });
    }

    // ── Build months form ──
    const monthsForm = document.getElementById('months-form');
    MONTHS.forEach((m, i) => {
      const chip = document.createElement('span');
      chip.className = 'month-chip';
      chip.textContent = m.slice(0, 3);
      chip.dataset.month = i + 1;
      chip.addEventListener('click', () => chip.classList.toggle('selected'));
      monthsForm.appendChild(chip);
    });

    function readClosedMonths() {
      return Array.from(document.querySelectorAll('.month-chip.selected')).map(c => Number(c.dataset.month));
    }

    function resetMonths() {
      document.querySelectorAll('.month-chip').forEach(c => c.classList.remove('selected'));
    }

    // ── Videos ──
    async function loadVideos() {
      const res = await fetch(`${CabinOS.API}/videos`);
      const videos = await res.json();
      const list = document.getElementById('videos-list');
      list.innerHTML = videos.map(v => `
        <li class="contact-item">
          <div class="contact-info">
            <div class="contact-name">${esc(v.title)}</div>
            <div class="contact-role">${esc(v.category)}${v.notes ? ' · ' + esc(v.notes) : ''}</div>
          </div>
          <button class="btn btn-danger" data-del-video="${v.id}" style="padding:.35rem .65rem;font-size:.8rem">Delete</button>
        </li>`).join('') || '<li class="muted">No videos.</li>';
      list.querySelectorAll('[data-del-video]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Delete this video?')) return;
          await CabinOS.apiFetch(`/videos/${btn.dataset.delVideo}`, { method: 'DELETE' });
          loadVideos();
        });
      });
    }

    document.getElementById('add-video-form').addEventListener('submit', async e => {
      e.preventDefault();
      if (!requireAuth()) return;
      const res = await CabinOS.apiFetch('/videos', {
        method: 'POST',
        body: JSON.stringify({
          id: CabinOS.ulid(),
          title: document.getElementById('new-video-title').value.trim(),
          url: document.getElementById('new-video-url').value.trim(),
          category: document.getElementById('new-video-category').value.trim(),
          notes: document.getElementById('new-video-notes').value.trim(),
          sort_order: 0,
        }),
      });
      if (res.ok) {
        e.target.reset();
        loadVideos();
      }
    });

    // ── Businesses ──
    async function loadBusinesses() {
      const res = await fetch(`${CabinOS.API}/businesses`);
      const businesses = await res.json();
      const list = document.getElementById('businesses-list');
      list.innerHTML = businesses.map(b => `
        <li class="contact-item">
          <div class="contact-info">
            <div class="contact-name">${esc(b.name)}</div>
            <div class="contact-role">${esc(b.category)}</div>
          </div>
          <button class="btn btn-danger" data-del-biz="${b.id}" style="padding:.35rem .65rem;font-size:.8rem">Delete</button>
        </li>`).join('') || '<li class="muted">No businesses.</li>';
      list.querySelectorAll('[data-del-biz]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Delete this business?')) return;
          await CabinOS.apiFetch(`/businesses/${btn.dataset.delBiz}`, { method: 'DELETE' });
          loadBusinesses();
        });
      });
    }

    document.getElementById('add-business-form').addEventListener('submit', async e => {
      e.preventDefault();
      if (!requireAuth()) return;
      const res = await CabinOS.apiFetch('/businesses', {
        method: 'POST',
        body: JSON.stringify({
          id: CabinOS.ulid(),
          name: document.getElementById('biz-name').value.trim(),
          category: document.getElementById('biz-category').value.trim(),
          description: document.getElementById('biz-description').value.trim(),
          address: document.getElementById('biz-address').value.trim(),
          phone: document.getElementById('biz-phone').value.trim(),
          website: document.getElementById('biz-website').value.trim(),
          hours: readHours(),
          closed_months: readClosedMonths(),
          sort_order: 0,
        }),
      });
      if (res.ok) {
        e.target.reset();
        resetHours();
        resetMonths();
        loadBusinesses();
      }
    });

    // ── Photo categories ──
    async function loadCategories() {
      const res = await fetch(`${CabinOS.API}/photo-categories`);
      const cats = await res.json();
      const list = document.getElementById('categories-list');
      list.innerHTML = cats.map(c => `
        <li class="contact-item">
          <div class="contact-info"><div class="contact-name">${esc(c.label)}</div></div>
          <button class="btn btn-danger" data-delete-cat="${c.id}" style="padding:.35rem .65rem;font-size:.8rem">Delete</button>
        </li>`).join('') || '<li class="muted">No categories.</li>';
      list.querySelectorAll('[data-delete-cat]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Delete this category?')) return;
          await CabinOS.apiFetch(`/photo-categories/${btn.dataset.deleteCat}`, { method: 'DELETE' });
          loadCategories();
        });
      });
    }

    document.getElementById('add-category-form').addEventListener('submit', async e => {
      e.preventDefault();
      if (!requireAuth()) return;
      const res = await CabinOS.apiFetch('/photo-categories', {
        method: 'POST',
        body: JSON.stringify({ id: CabinOS.ulid(), label: document.getElementById('new-category-label').value.trim(), sort_order: 999 }),
      });
      if (res.ok) { document.getElementById('new-category-label').value = ''; loadCategories(); }
    });

    // ── Checklist items ──
    async function loadChecklistItems() {
      const res = await fetch(`${CabinOS.API}/checklist/items`);
      const items = await res.json();
      const list = document.getElementById('checklist-items-list');
      list.innerHTML = items.map(i => `
        <li class="contact-item">
          <div class="contact-info">
            <div class="contact-name">${esc(i.label)}</div>
            <div class="contact-role">${esc(i.section)}</div>
          </div>
          <button class="btn btn-danger" data-delete-item="${i.id}" style="padding:.35rem .65rem;font-size:.8rem">Delete</button>
        </li>`).join('') || '<li class="muted">No items.</li>';
      list.querySelectorAll('[data-delete-item]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Delete this checklist item?')) return;
          await CabinOS.apiFetch(`/checklist/items/${btn.dataset.deleteItem}`, { method: 'DELETE' });
          loadChecklistItems();
        });
      });
    }

    document.getElementById('add-item-form').addEventListener('submit', async e => {
      e.preventDefault();
      if (!requireAuth()) return;
      const res = await CabinOS.apiFetch('/checklist/items', {
        method: 'POST',
        body: JSON.stringify({ id: CabinOS.ulid(), label: document.getElementById('new-item-label').value.trim(), section: document.getElementById('new-item-section').value.trim(), sort_order: 999 }),
      });
      if (res.ok) { document.getElementById('new-item-label').value = ''; loadChecklistItems(); }
    });

    loadVideos();
    loadBusinesses();
    loadCategories();
    loadChecklistItems();
  </script>
</body>
</html>
