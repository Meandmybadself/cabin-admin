<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todos — Cabin OS</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .filter-bar { display:flex; gap:.4rem; margin-bottom:1rem; flex-wrap:wrap; }
    .filter-pill {
      padding:.3rem .85rem; border-radius:99px; border:none; font-size:.85rem;
      font-weight:600; cursor:pointer; background:var(--tan-dark); color:var(--text);
      transition:background .12s, color .12s;
    }
    .filter-pill.active { background:var(--green-mid); color:#fff; }

    .todo-list { list-style:none; }

    /* ── Main todo row ─────────────────────────────────────────── */
    .todo-item {
      border-bottom:1px solid var(--tan-dark);
    }
    .todo-item:last-child { border-bottom:none; }

    .todo-main {
      display:flex; align-items:flex-start; gap:.65rem;
      padding:.65rem 0; cursor:pointer; user-select:none;
    }
    .todo-main:hover .todo-title { color:var(--green-dark); }

    .todo-checkbox {
      width:1.2rem; height:1.2rem; flex-shrink:0; margin-top:.2rem;
      accent-color:var(--green-mid); cursor:pointer;
    }

    .todo-body { flex:1; min-width:0; }
    .todo-title { font-weight:600; line-height:1.4; word-break:break-word; transition:color .1s; }
    .todo-item.done .todo-title { text-decoration:line-through; color:var(--text-muted); }
    .todo-meta { font-size:.78rem; color:var(--text-muted); margin-top:.15rem; }

    .todo-actions { display:flex; gap:.2rem; flex-shrink:0; margin-top:.05rem; align-items:center; }
    .todo-icon-btn {
      background:none; border:none; cursor:pointer; padding:.3rem;
      line-height:1; color:var(--text-muted); border-radius:var(--radius);
    }
    .todo-icon-btn:hover { background:var(--tan-dark); }
    .todo-icon-btn.delete:hover { background:#f8d7da; color:#721c24; }
    .todo-chevron { transition:transform .2s; }
    .todo-item.expanded .todo-chevron { transform:rotate(180deg); }

    /* ── Expanded detail ───────────────────────────────────────── */
    .todo-detail {
      padding:.1rem 0 .85rem 1.85rem;
      display:none;
    }
    .todo-item.expanded .todo-detail { display:block; }

    .todo-desc { font-size:.875rem; margin-bottom:.75rem; }

    .media-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(110px, 1fr));
      gap:.5rem;
      margin-bottom:.6rem;
    }
    .media-item {
      position:relative; border-radius:var(--radius); overflow:hidden;
      background:var(--tan-dark); aspect-ratio:1;
    }
    .media-thumb-img {
      width:100%; height:100%; object-fit:cover; display:block;
    }
    .media-thumb-video {
      width:100%; height:100%; object-fit:cover; display:block;
    }
    .media-delete-btn {
      position:absolute; top:.25rem; right:.25rem;
      background:rgba(0,0,0,.55); color:#fff; border:none; border-radius:50%;
      width:1.35rem; height:1.35rem; font-size:.85rem; line-height:1;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity .15s;
    }
    .media-item:hover .media-delete-btn { opacity:1; }

    .media-upload-row { display:flex; gap:.4rem; flex-wrap:wrap; margin-top:.1rem; }
    .media-upload-label {
      display:inline-flex; align-items:center; gap:.3rem;
      padding:.3rem .7rem; border-radius:var(--radius);
      border:1.5px solid var(--tan-dark); color:var(--text-muted);
      font-size:.82rem; font-weight:600; cursor:pointer; background:#fff;
    }
    .media-upload-label:hover { border-color:var(--green-mid); color:var(--green-mid); }
    .media-upload-label.uploading { opacity:.5; pointer-events:none; }

    /* ── Toolbar ───────────────────────────────────────────────── */
    .toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:.75rem; flex-wrap:wrap; gap:.5rem; }

    /* ── Modal ─────────────────────────────────────────────────── */
    .modal-card {
      background:#fff; border-radius:var(--radius);
      box-shadow:0 8px 32px rgba(0,0,0,.2);
      width:100%; max-width:460px; padding:1.5rem;
    }
    .modal-card h2 { margin-bottom:1rem; color:var(--green-dark); }
    .modal-card .form-row { margin-bottom:.6rem; }
    .modal-card label { display:block; font-size:.82rem; font-weight:600; margin-bottom:.25rem; color:var(--text-muted); }
    .modal-actions { display:flex; gap:.5rem; margin-top:1rem; }
  </style>
</head>
<body>
  <nav id="nav">
    <a href="/" class="nav-brand">Cabin OS</a>
    <div class="nav-links">
      <a href="/pages/wiki/">Wiki</a>
      <a href="/pages/checklists/">Checklists</a>
      <a href="/pages/photos/">Photos</a>
      <a href="/pages/contacts/">Contacts</a>
      <a href="/pages/businesses/">Businesses</a>
      <a href="/pages/appliances/">Appliances</a>
      <a href="/pages/todos/">Todos</a>
      <a href="/pages/settings/">Settings</a>
    </div>
  </nav>
  <main>
    <div class="toolbar">
      <h1 class="page-title" style="margin-bottom:0">Todos</h1>
      <div style="display:flex;gap:.5rem;align-items:center">
        <button class="btn btn-danger hidden" id="clear-btn" style="font-size:.82rem;padding:.35rem .75rem">Clear completed</button>
        <button class="btn btn-primary" id="add-btn">+ Add</button>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-pill active" data-filter="all">All</button>
      <button class="filter-pill" data-filter="active">Active</button>
      <button class="filter-pill" data-filter="completed">Completed</button>
    </div>

    <div id="todo-list-container"><p class="muted">Loading…</p></div>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2 id="modal-title">Add todo</h2>
      <form id="todo-form" autocomplete="off">
        <div class="form-row">
          <label>Title *</label>
          <input type="text" id="t-title" required data-1p-ignore autocomplete="off">
        </div>
        <div class="form-row">
          <label>Category</label>
          <input type="text" id="t-category" placeholder="e.g. Maintenance, Shopping" data-1p-ignore autocomplete="off" list="category-datalist">
          <datalist id="category-datalist"></datalist>
        </div>
        <div class="form-row">
          <label>Description</label>
          <textarea id="t-desc" style="min-height:80px" data-md></textarea>
        </div>
        <p id="form-error" class="error hidden"></p>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" class="btn btn-secondary" id="cancel-btn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/assets/app.js" type="module"></script>
  <script type="module">
    const SVG_EDIT    = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
    const SVG_DELETE  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;
    const SVG_CHEVRON = `<svg class="todo-chevron" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,6 8,10 12,6"/></svg>`;

    function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    let allTodos     = [];
    let activeFilter = 'all';
    let editingId    = null;
    const openIds    = new Set();

    // ── Filter pills ───────────────────────────────────────────
    document.querySelectorAll('.filter-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        activeFilter = pill.dataset.filter;
        renderList();
      });
    });

    // ── Helpers ────────────────────────────────────────────────
    function visibleTodos() {
      if (activeFilter === 'active')    return allTodos.filter(t => !t.done);
      if (activeFilter === 'completed') return allTodos.filter(t =>  t.done);
      return allTodos;
    }

    function mediaHtml(todo) {
      const media = todo.media || [];
      return `
        ${media.length ? `
          <div class="media-grid">
            ${media.map(m => `
              <div class="media-item">
                ${m.media_type === 'image'
                  ? `<img class="media-thumb-img" src="${esc(m.url)}" alt="${esc(m.filename)}" loading="lazy">`
                  : `<video class="media-thumb-video" src="${esc(m.url)}" preload="metadata"></video>`
                }
                <button class="media-delete-btn" data-media-id="${esc(m.id)}" data-todo-id="${esc(todo.id)}" title="Remove">×</button>
              </div>`).join('')}
          </div>` : ''}
        <div class="media-upload-row">
          <label class="media-upload-label" title="Add image">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            Add image
            <input type="file" accept="image/*" class="media-file-input" data-todo-id="${esc(todo.id)}" data-media-type="image" style="display:none">
          </label>
          <label class="media-upload-label" title="Add video">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
            Add video
            <input type="file" accept="video/*" class="media-file-input" data-todo-id="${esc(todo.id)}" data-media-type="video" style="display:none">
          </label>
        </div>`;
    }

    // ── Render ─────────────────────────────────────────────────
    function renderList() {
      const container = document.getElementById('todo-list-container');
      const todos = visibleTodos();

      document.getElementById('clear-btn').classList.toggle('hidden', !allTodos.some(t => t.done));

      if (!todos.length) {
        const msg = activeFilter === 'completed' ? 'No completed todos.'
                  : activeFilter === 'active'    ? 'Nothing left to do!'
                  : 'No todos yet. Tap + Add to get started.';
        container.innerHTML = `<p class="muted">${msg}</p>`;
        return;
      }

      const byCategory = {};
      for (const t of todos) (byCategory[t.category] = byCategory[t.category] || []).push(t);

      container.innerHTML = Object.entries(byCategory).map(([cat, items]) => `
        <div class="section-label">${esc(cat)}</div>
        <div class="card" style="padding:0 1.25rem">
          <ul class="todo-list">
            ${items.map(t => {
              const expanded = openIds.has(t.id);
              return `
              <li class="todo-item${t.done ? ' done' : ''}${expanded ? ' expanded' : ''}" data-id="${esc(t.id)}">
                <div class="todo-main">
                  <input type="checkbox" class="todo-checkbox" ${t.done ? 'checked' : ''} data-id="${esc(t.id)}" title="Toggle complete">
                  <div class="todo-body">
                    <div class="todo-title">${esc(t.title)}</div>
                    ${(t.media||[]).length ? `<div class="todo-meta">${t.media.length} attachment${t.media.length !== 1 ? 's' : ''}</div>` : ''}
                  </div>
                  <div class="todo-actions">
                    <button class="todo-icon-btn edit-btn" data-id="${esc(t.id)}" title="Edit">${SVG_EDIT}</button>
                    <button class="todo-icon-btn delete delete-btn" data-id="${esc(t.id)}" title="Delete">${SVG_DELETE}</button>
                    <button class="todo-icon-btn expand-btn" data-id="${esc(t.id)}" title="Expand">${SVG_CHEVRON}</button>
                  </div>
                </div>
                <div class="todo-detail">
                  ${t.description ? `<div class="todo-desc notes-md">${CabinOS.renderMarkdown(t.description)}</div>` : ''}
                  ${mediaHtml(t)}
                </div>
              </li>`;
            }).join('')}
          </ul>
        </div>`).join('');

      // Expand/collapse — click main row or chevron
      container.querySelectorAll('.todo-main').forEach(row => {
        row.addEventListener('click', e => {
          if (e.target.closest('.todo-checkbox') || e.target.closest('.edit-btn') || e.target.closest('.delete-btn')) return;
          const id = row.closest('.todo-item').dataset.id;
          if (openIds.has(id)) openIds.delete(id); else openIds.add(id);
          renderList();
        });
      });

      // Checkbox toggle
      container.querySelectorAll('.todo-checkbox').forEach(cb =>
        cb.addEventListener('change', async e => {
          e.stopPropagation();
          const todo = allTodos.find(t => t.id === cb.dataset.id);
          if (!todo) return;
          await CabinOS.apiFetch(`/todos/${todo.id}`, {
            method: 'PUT',
            body: JSON.stringify({ ...todo, done: cb.checked ? 1 : 0 }),
          });
          load();
        })
      );

      // Edit
      container.querySelectorAll('.edit-btn').forEach(btn =>
        btn.addEventListener('click', e => { e.stopPropagation(); openModal(btn.dataset.id); })
      );

      // Delete todo
      container.querySelectorAll('.delete-btn').forEach(btn =>
        btn.addEventListener('click', async e => {
          e.stopPropagation();
          if (!confirm('Delete this todo?')) return;
          await CabinOS.apiFetch(`/todos/${btn.dataset.id}`, { method: 'DELETE' });
          openIds.delete(btn.dataset.id);
          load();
        })
      );

      // Delete media
      container.querySelectorAll('.media-delete-btn').forEach(btn =>
        btn.addEventListener('click', async e => {
          e.stopPropagation();
          if (!confirm('Remove this attachment?')) return;
          await CabinOS.apiFetch(`/todos/${btn.dataset.todoId}/media/${btn.dataset.mediaId}`, { method: 'DELETE' });
          load();
        })
      );

      // Upload media
      container.querySelectorAll('.media-file-input').forEach(input =>
        input.addEventListener('change', e => { e.stopPropagation(); handleMediaUpload(input); })
      );
    }

    // ── Media upload ───────────────────────────────────────────
    async function handleMediaUpload(input) {
      const file = input.files[0];
      if (!file) return;
      const todoId    = input.dataset.todoId;
      const mediaType = input.dataset.mediaType;
      const label     = input.closest('.media-upload-label');
      if (label) label.classList.add('uploading');

      try {
        const mediaId = CabinOS.ulid();
        const presignRes = await CabinOS.apiFetch(`/todos/${todoId}/media/presign`, {
          method: 'POST',
          body: JSON.stringify({ id: mediaId, content_type: file.type || (mediaType === 'image' ? 'image/jpeg' : 'video/mp4') }),
        });
        const { upload_url, r2_key } = await presignRes.json();

        await fetch(upload_url, {
          method: 'PUT',
          headers: { 'Content-Type': file.type || (mediaType === 'image' ? 'image/jpeg' : 'video/mp4') },
          body: file,
        });

        await CabinOS.apiFetch(`/todos/${todoId}/media/confirm`, {
          method: 'POST',
          body: JSON.stringify({ id: mediaId, r2_key, media_type: mediaType, filename: file.name }),
        });

        openIds.add(todoId);
        load();
      } catch (err) {
        console.error(err);
        alert('Upload failed. Please try again.');
      } finally {
        input.value = '';
        if (label) label.classList.remove('uploading');
      }
    }

    // ── Load ───────────────────────────────────────────────────
    async function load() {
      const res = await fetch(`${CabinOS.API}/todos`);
      allTodos = await res.json();
      renderList();
      refreshCategoryDatalist();
    }

    function refreshCategoryDatalist() {
      const cats = [...new Set(allTodos.map(t => t.category))].filter(Boolean).sort();
      document.getElementById('category-datalist').innerHTML =
        cats.map(c => `<option value="${esc(c)}">`).join('');
    }

    // ── Clear completed ────────────────────────────────────────
    document.getElementById('clear-btn').addEventListener('click', async () => {
      if (!confirm('Delete all completed todos?')) return;
      await CabinOS.apiFetch('/todos/completed', { method: 'DELETE' });
      load();
    });

    // ── Modal ──────────────────────────────────────────────────
    function openModal(id = null) {
      editingId = id;
      document.getElementById('modal-title').textContent = id ? 'Edit todo' : 'Add todo';
      document.getElementById('todo-form').reset();
      document.getElementById('form-error').classList.add('hidden');
      CabinOS.resetMdEditor(document.getElementById('t-desc'));
      if (id) {
        const t = allTodos.find(x => x.id === id);
        if (t) {
          document.getElementById('t-title').value    = t.title       || '';
          document.getElementById('t-category').value = t.category    || '';
          document.getElementById('t-desc').value     = t.description || '';
        }
      }
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      editingId = null;
    }

    document.getElementById('add-btn').addEventListener('click', () => openModal());
    document.getElementById('cancel-btn').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal();
    });

    document.getElementById('todo-form').addEventListener('submit', async e => {
      e.preventDefault();
      const errEl = document.getElementById('form-error');
      errEl.classList.add('hidden');
      const payload = {
        title:       document.getElementById('t-title').value.trim(),
        category:    document.getElementById('t-category').value.trim() || 'General',
        description: document.getElementById('t-desc').value.trim(),
      };
      const res = editingId
        ? await CabinOS.apiFetch(`/todos/${editingId}`, {
            method: 'PUT',
            body: JSON.stringify({ ...allTodos.find(t => t.id === editingId), ...payload }),
          })
        : await CabinOS.apiFetch('/todos', {
            method: 'POST',
            body: JSON.stringify({ id: CabinOS.ulid(), ...payload }),
          });
      if (res.ok) { closeModal(); load(); }
      else {
        const body = await res.json().catch(() => ({}));
        errEl.textContent = body.error || 'Save failed.';
        errEl.classList.remove('hidden');
      }
    });

    load();
  </script>
</body>
</html>
