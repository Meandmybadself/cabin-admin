<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacts — Cabin OS</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .contact-actions { display:flex; gap:.25rem; margin-left:.5rem; flex-shrink:0; }
    .contact-icon-btn { background:none; border:none; cursor:pointer; padding:.3rem; line-height:1; color:var(--text-muted); border-radius:var(--radius); }
    .contact-icon-btn:hover { background:var(--tan-dark); }
    .contact-icon-btn.delete:hover { background:#f8d7da; color:#721c24; }

    .modal-card {
      background:#fff; border-radius:var(--radius);
      box-shadow:0 8px 32px rgba(0,0,0,.2);
      width:100%; max-width:420px;
      padding:1.5rem;
    }
    .modal-card h2 { margin-bottom:1rem; color:var(--green-dark); }
    .modal-card .form-row { margin-bottom:.6rem; }
    .modal-card label { display:block; font-size:.82rem; font-weight:600; margin-bottom:.25rem; color:var(--text-muted); }
    .modal-actions { display:flex; gap:.5rem; margin-top:1rem; }
  </style>
</head>
<body>
  <nav id="nav">
    <a href="/" class="nav-brand">Cabin OS</a>
    <div class="nav-links">
      <a href="/pages/wiki/">Wiki</a>
      <a href="/pages/checklists/">Checklists</a>
      <a href="/pages/photos/">Photos</a>
      <a href="/pages/contacts/">Contacts</a>
      <a href="/pages/businesses/">Businesses</a>
      <a href="/pages/appliances/">Appliances</a>
      <a href="/pages/settings/">Settings</a>
    </div>
  </nav>
  <main>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <h1 class="page-title" style="margin-bottom:0">Contacts</h1>
      <button class="btn btn-primary" id="add-btn">+ Add</button>
    </div>
    <div class="card">
      <ul class="contact-list" id="contact-list">
        <li class="muted">Loading…</li>
      </ul>
    </div>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2 id="modal-title">Add contact</h2>
      <form id="contact-form" autocomplete="off">
        <div class="form-row">
          <label>Name *</label>
          <input type="text" id="c-name" required data-1p-ignore autocomplete="off">
        </div>
        <div class="form-row">
          <label>Role</label>
          <input type="text" id="c-role" placeholder="e.g. Plumber, Neighbor" data-1p-ignore autocomplete="off">
        </div>
        <div class="form-row">
          <label>Phone</label>
          <input type="tel" id="c-phone" data-1p-ignore autocomplete="off">
        </div>
        <div class="form-row">
          <label>Notes</label>
          <textarea id="c-notes" style="min-height:70px"></textarea>
        </div>
        <p id="form-error" class="error hidden"></p>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" class="btn btn-secondary" id="cancel-btn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/assets/app.js" type="module"></script>
  <script type="module">
    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    const SVG_EDIT = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
    const SVG_DELETE = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;

    let allContacts = [];

    function renderList() {
      const list = document.getElementById('contact-list');
      if (!allContacts.length) { list.innerHTML = '<li class="muted">No contacts yet.</li>'; return; }
      list.innerHTML = allContacts.map(c => `
        <li class="contact-item">
          <div class="contact-info">
            <div class="contact-name">${esc(c.name)}</div>
            ${c.role ? `<div class="contact-role">${esc(c.role)}</div>` : ''}
            ${c.notes ? `<div class="muted" style="font-size:.85rem">${esc(c.notes)}</div>` : ''}
          </div>
          ${c.phone ? `<a class="contact-phone" href="tel:${esc(c.phone)}">${esc(c.phone)}</a>` : ''}
          <div class="contact-actions">
            <button class="contact-icon-btn edit-btn" data-id="${esc(c.id)}" title="Edit">${SVG_EDIT}</button>
            <button class="contact-icon-btn delete delete-btn" data-id="${esc(c.id)}" title="Delete">${SVG_DELETE}</button>
          </div>
        </li>`).join('');

      list.querySelectorAll('.edit-btn').forEach(btn =>
        btn.addEventListener('click', () => openModal(btn.dataset.id))
      );
      list.querySelectorAll('.delete-btn').forEach(btn =>
        btn.addEventListener('click', async () => {
          if (!confirm('Delete this contact?')) return;
          await CabinOS.apiFetch(`/contacts/${btn.dataset.id}`, { method: 'DELETE' });
          load();
        })
      );
    }

    async function load() {
      const res = await fetch(`${CabinOS.API}/contacts`);
      allContacts = await res.json();
      renderList();
    }

    let editingId = null;

    function openModal(id = null) {
      editingId = id;
      document.getElementById('modal-title').textContent = id ? 'Edit contact' : 'Add contact';
      document.getElementById('contact-form').reset();
      document.getElementById('form-error').classList.add('hidden');
      if (id) {
        const c = allContacts.find(x => x.id === id);
        if (c) {
          document.getElementById('c-name').value  = c.name  || '';
          document.getElementById('c-role').value  = c.role  || '';
          document.getElementById('c-phone').value = c.phone || '';
          document.getElementById('c-notes').value = c.notes || '';
        }
      }
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      editingId = null;
    }

    document.getElementById('add-btn').addEventListener('click', () => openModal());
    document.getElementById('cancel-btn').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal();
    });

    document.getElementById('contact-form').addEventListener('submit', async e => {
      e.preventDefault();
      const errEl = document.getElementById('form-error');
      errEl.classList.add('hidden');
      const payload = {
        name:  document.getElementById('c-name').value.trim(),
        role:  document.getElementById('c-role').value.trim(),
        phone: document.getElementById('c-phone').value.trim(),
        notes: document.getElementById('c-notes').value.trim(),
        sort_order: editingId ? (allContacts.find(c => c.id === editingId)?.sort_order ?? 0) : allContacts.length,
      };
      const res = editingId
        ? await CabinOS.apiFetch(`/contacts/${editingId}`, { method: 'PUT', body: JSON.stringify(payload) })
        : await CabinOS.apiFetch('/contacts', { method: 'POST', body: JSON.stringify({ id: CabinOS.ulid(), ...payload }) });
      if (res.ok) {
        closeModal();
        load();
      } else {
        const body = await res.json().catch(() => ({}));
        errEl.textContent = body.error || 'Save failed.';
        errEl.classList.remove('hidden');
      }
    });

    load();
  </script>
</body>
</html>
