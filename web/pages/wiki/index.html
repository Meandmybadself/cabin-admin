<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiki — Cabin OS</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    #doc-layout { display:block; }
    #doc-placeholder { color:var(--text-muted); font-size:.95rem; padding:.5rem 0; }
    .doc-list a { color:var(--green-mid); }
    .doc-list a.active { font-weight:700; color:var(--green-dark); }

    @media (min-width: 768px) {
      #doc-layout {
        display:grid;
        grid-template-columns:240px 1fr;
        gap:1.25rem;
        align-items:start;
      }
      #doc-list-view, #doc-detail-view { display:block !important; }
      #doc-list-view { position:sticky; top:1rem; }
      #back-btn { display:none !important; }
    }

    .wiki-tabs { display:flex; gap:.5rem; margin-bottom:1.25rem; }
    .wiki-tab {
      padding:.5rem 1rem; border-radius:var(--radius); border:none;
      font-size:.9rem; font-weight:600; cursor:pointer;
      background:var(--tan-dark); color:var(--text);
    }
    .wiki-tab.active { background:var(--green-mid); color:#fff; }
    .video-grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap:1rem; margin-bottom:1.5rem;
    }
    .video-card {
      background:#fff; border-radius:var(--radius); box-shadow:var(--shadow);
      overflow:hidden; cursor:pointer;
    }
    .video-thumb-wrap { position:relative; aspect-ratio:16/9; background:#111; overflow:hidden; }
    .video-thumb-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
    .video-play {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,.3);
    }
    .video-play svg { width:48px; height:48px; fill:#fff; opacity:.9; }
    .video-info { padding:.75rem; }
    .video-title { font-weight:600; font-size:.9rem; line-height:1.3; }
    .video-notes { font-size:.8rem; color:var(--text-muted); margin-top:.25rem; }
    .video-modal-card {
      background:#fff; border-radius:var(--radius);
      box-shadow:0 8px 32px rgba(0,0,0,.2);
      width:100%; max-width:720px; overflow:hidden;
    }
    .video-modal-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:.75rem 1rem; border-bottom:1px solid var(--tan-dark);
    }
    .video-modal-title { font-weight:600; font-size:1rem; }
    .close-btn { background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--text-muted); padding:.25rem; }
    .video-embed { width:100%; aspect-ratio:16/9; border:none; }
  </style>
</head>
<body>
  <nav id="nav">
    <a href="/" class="nav-brand">Cabin OS</a>
    <div class="nav-links">
      <a href="/pages/wiki/">Wiki</a>
      <a href="/pages/checklists/">Checklists</a>
      <a href="/pages/photos/">Photos</a>
      <a href="/pages/contacts/">Contacts</a>
      <a href="/pages/businesses/">Businesses</a>
      <a href="/pages/appliances/">Appliances</a>
      <a href="/pages/settings/">Settings</a>
    </div>
  </nav>
  <main>
    <h1 class="page-title">Wiki</h1>
    <div class="wiki-tabs">
      <button class="wiki-tab active" data-tab="docs">Docs</button>
      <button class="wiki-tab" data-tab="videos">Videos</button>
    </div>

    <div id="tab-docs">
      <div id="doc-layout">
        <div id="doc-list-view">
          <div class="card" id="doc-list-card"><p class="muted">Loading…</p></div>
        </div>
        <div id="doc-detail-view" class="hidden">
          <div style="display:flex;gap:.5rem;align-items:center;margin-bottom:.75rem">
            <button class="btn btn-secondary" id="back-btn">← Back</button>
            <button class="btn btn-secondary" id="edit-btn" style="display:none">Edit</button>
          </div>
          <div class="card">
            <div id="doc-placeholder">Select a document from the list.</div>

            <!-- Read view -->
            <div id="doc-read-view">
              <h2 id="doc-title" style="margin-bottom:.75rem;color:var(--green-dark);display:none"></h2>
              <div class="doc-body" id="doc-body"></div>
            </div>

            <!-- Edit view -->
            <div id="doc-edit-view" style="display:none">
              <div style="display:flex;flex-direction:column;gap:.5rem;margin-bottom:.75rem">
                <input type="text" id="edit-title" placeholder="Title" style="font-size:1.1rem;font-weight:600" data-1p-ignore autocomplete="off">
                <input type="text" id="edit-category" placeholder="Category" data-1p-ignore autocomplete="off">
              </div>
              <textarea id="edit-body" style="width:100%;min-height:320px;font-family:monospace;font-size:.88rem;resize:vertical"></textarea>
              <div style="display:flex;gap:.5rem;margin-top:.75rem">
                <button class="btn btn-primary" id="save-btn">Save</button>
                <button class="btn btn-secondary" id="cancel-edit-btn">Cancel</button>
                <span id="edit-error" style="color:#721c24;font-size:.88rem;align-self:center;display:none"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="tab-videos" class="hidden">
      <div id="video-list"><p class="muted">Loading…</p></div>
    </div>
  </main>

  <div id="video-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="video-modal-card">
      <div class="video-modal-header">
        <span class="video-modal-title" id="video-modal-title"></span>
        <button class="close-btn" id="video-close">&#x2715;</button>
      </div>
      <iframe id="video-embed" class="video-embed" allowfullscreen
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
      </iframe>
    </div>
  </div>

  <script src="/assets/app.js" type="module"></script>
  <script type="module">
    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function ytId(url) {
      const m = url.match(/(?:youtu\.be\/|v=|\/embed\/)([A-Za-z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    document.querySelectorAll('.wiki-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.wiki-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.getElementById('tab-docs').classList.toggle('hidden', tab !== 'docs');
        document.getElementById('tab-videos').classList.toggle('hidden', tab !== 'videos');
        if (tab === 'videos') loadVideos();
      });
    });

    const isWide = () => window.matchMedia('(min-width: 768px)').matches;

    async function loadList() {
      const res = await fetch(`${CabinOS.API}/docs`);
      const docs = await res.json();
      const card = document.getElementById('doc-list-card');
      if (!docs.length) { card.innerHTML = '<p class="muted">No docs yet.</p>'; return; }
      const byCategory = {};
      for (const d of docs) (byCategory[d.category] = byCategory[d.category] || []).push(d);
      card.innerHTML = Object.entries(byCategory).map(([cat, items]) => `
        <div class="section-label">${esc(cat)}</div>
        <ul class="doc-list">${items.map(d =>
          `<li class="doc-item"><a href="#" data-slug="${esc(d.slug)}">${esc(d.title)}</a></li>`
        ).join('')}</ul>`).join('');
      card.querySelectorAll('a[data-slug]').forEach(a =>
        a.addEventListener('click', e => { e.preventDefault(); loadDoc(a.dataset.slug); })
      );
      if (isWide()) document.getElementById('doc-detail-view').classList.remove('hidden');
    }

    let currentDoc = null;

    function showReadView(doc) {
      document.getElementById('doc-placeholder').style.display = 'none';
      document.getElementById('doc-edit-view').style.display = 'none';
      document.getElementById('doc-read-view').style.display = '';
      const titleEl = document.getElementById('doc-title');
      titleEl.style.display = '';
      titleEl.textContent = doc.title;
      document.getElementById('doc-body').innerHTML = CabinOS.renderMarkdown(doc.body);
      document.getElementById('edit-btn').style.display = '';
    }

    async function loadDoc(slug) {
      const res = await fetch(`${CabinOS.API}/docs/${slug}`);
      if (!res.ok) return;
      currentDoc = await res.json();
      showReadView(currentDoc);
      document.querySelectorAll('#doc-list-card a[data-slug]').forEach(a =>
        a.classList.toggle('active', a.dataset.slug === slug)
      );
      if (isWide()) return;
      document.getElementById('doc-list-view').classList.add('hidden');
      document.getElementById('doc-detail-view').classList.remove('hidden');
      window.scrollTo(0, 0);
    }

    document.getElementById('back-btn').addEventListener('click', () => {
      document.getElementById('doc-detail-view').classList.add('hidden');
      document.getElementById('doc-list-view').classList.remove('hidden');
    });

    document.getElementById('edit-btn').addEventListener('click', () => {
      document.getElementById('doc-read-view').style.display = 'none';
      document.getElementById('doc-edit-view').style.display = '';
      document.getElementById('edit-title').value = currentDoc.title;
      document.getElementById('edit-category').value = currentDoc.category;
      document.getElementById('edit-body').value = currentDoc.body;
      document.getElementById('edit-error').style.display = 'none';
    });

    document.getElementById('cancel-edit-btn').addEventListener('click', () => {
      showReadView(currentDoc);
    });

    document.getElementById('save-btn').addEventListener('click', async () => {
      const errEl = document.getElementById('edit-error');
      errEl.style.display = 'none';
      const payload = {
        slug: currentDoc.slug,
        title: document.getElementById('edit-title').value.trim(),
        category: document.getElementById('edit-category').value.trim(),
        body: document.getElementById('edit-body').value,
      };
      const res = await CabinOS.apiFetch(`/docs/${currentDoc.id}`, {
        method: 'PUT',
        body: JSON.stringify(payload),
      });
      if (res.ok) {
        currentDoc = await res.json();
        showReadView(currentDoc);
        await loadList();
      } else {
        const data = await res.json().catch(() => ({}));
        errEl.textContent = data.error || 'Save failed.';
        errEl.style.display = '';
      }
    });

    let videosLoaded = false;
    async function loadVideos() {
      if (videosLoaded) return;
      videosLoaded = true;
      const res = await fetch(`${CabinOS.API}/videos`);
      const videos = await res.json();
      const container = document.getElementById('video-list');
      if (!videos.length) { container.innerHTML = '<p class="muted">No videos yet. Add them in Settings.</p>'; return; }
      const byCategory = {};
      for (const v of videos) (byCategory[v.category] = byCategory[v.category] || []).push(v);
      const videoMap = {};
      videos.forEach(v => videoMap[v.id] = v);
      container.innerHTML = Object.entries(byCategory).map(([cat, items]) => `
        ${cat ? `<div class="section-label">${esc(cat)}</div>` : ''}
        <div class="video-grid">${items.map(v => {
          const id = ytId(v.url);
          const thumb = id ? `https://img.youtube.com/vi/${id}/mqdefault.jpg` : '';
          return `<div class="video-card" data-video-id="${esc(v.id)}">
            <div class="video-thumb-wrap">
              ${thumb ? `<img src="${thumb}" alt="" loading="lazy">` : '<div style="height:100%;background:var(--tan-dark)"></div>'}
              <div class="video-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
            </div>
            <div class="video-info">
              <div class="video-title">${esc(v.title)}</div>
              ${v.notes ? `<div class="video-notes">${esc(v.notes)}</div>` : ''}
            </div>
          </div>`;
        }).join('')}</div>`).join('');
      container.querySelectorAll('.video-card').forEach(card => {
        card.addEventListener('click', () => {
          const v = videoMap[card.dataset.videoId];
          const id = ytId(v.url);
          if (!id) { window.open(v.url, '_blank'); return; }
          document.getElementById('video-modal-title').textContent = v.title;
          document.getElementById('video-embed').src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1`;
          document.getElementById('video-modal').classList.remove('hidden');
        });
      });
    }

    function closeVideo() {
      document.getElementById('video-modal').classList.add('hidden');
      document.getElementById('video-embed').src = '';
    }
    document.getElementById('video-close').addEventListener('click', closeVideo);
    document.getElementById('video-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('video-modal')) closeVideo();
    });

    loadList();
  </script>
</body>
</html>
