<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shutdown — Cabin OS</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .photo-item .checklist-label { display:flex; align-items:center; gap:.4rem; }
    .photo-item .camera-icon { color:var(--green-mid); flex-shrink:0; }
    .photo-item .photo-prompt-text { font-size:.82rem; color:var(--text-muted); margin:.15rem 0 .4rem 1.6rem; }
    .photo-upload-label {
      display:inline-flex; align-items:center; gap:.35rem;
      padding:.3rem .7rem; border-radius:var(--radius);
      border:1.5px solid var(--green-mid); color:var(--green-mid);
      font-size:.82rem; font-weight:600; cursor:pointer;
      margin-left:1.6rem; background:#fff;
    }
    .photo-upload-label:hover { background:var(--tan); }
    .photo-upload-label.uploading { opacity:.6; pointer-events:none; }
    .photo-taken-badge {
      display:inline-flex; align-items:center; gap:.3rem;
      margin-left:1.6rem; font-size:.82rem; font-weight:600;
      color:#155724;
    }
    .photo-thumb {
      display:block; width:80px; height:60px; object-fit:cover;
      border-radius:4px; margin:.4rem 0 .25rem 1.6rem;
      border:1px solid var(--tan-dark);
    }
  </style>
</head>
<body>
  <nav id="nav">
    <a href="/" class="nav-brand">Cabin OS</a>
    <div class="nav-links">
      <a href="/pages/wiki/">Wiki</a>
      <a href="/pages/shutdown/">Shutdown</a>
      <a href="/pages/photos/">Photos</a>
      <a href="/pages/contacts/">Contacts</a>
      <a href="/pages/businesses/">Businesses</a>
      <a href="/pages/appliances/">Appliances</a>
      <a href="/pages/settings/">Settings</a>
    </div>
  </nav>
  <main>
    <h1 class="page-title">Shutdown checklist</h1>

    <div id="start-view">
      <div class="card">
        <p style="margin-bottom:1rem">Run through all steps before leaving the cabin.</p>
        <button class="btn btn-primary" id="start-btn">Start checklist</button>
      </div>
    </div>

    <div id="checklist-view" class="hidden">
      <div class="progress-bar">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <p class="muted" id="progress-label"></p>
      <div id="checklist-sections"></div>
      <div class="checklist-actions mt1">
        <button class="btn btn-primary" id="complete-btn" disabled>Mark complete</button>
        <button class="btn btn-secondary" id="abandon-btn">Abandon</button>
      </div>
    </div>

    <div id="done-view" class="hidden">
      <div class="card">
        <h2 style="color:var(--green-dark);margin-bottom:.5rem">Checklist complete!</h2>
        <p class="muted" style="margin-bottom:1rem">All done — checkout photos have been saved.</p>
        <button class="btn btn-secondary" id="restart-btn">Start new checklist</button>
      </div>
    </div>
  </main>

  <script src="/assets/app.js" type="module"></script>
  <script type="module">
    const LS_KEY = 'cabin_checklist_session';
    const CHECKOUT_CATEGORY_ID = 'checkout';

    let session = null;
    let items   = [];
    // Map of itemId → { url, thumb } for photos taken this session render
    const sessionPhotos = {};

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    const SVG_CAMERA = `<svg class="camera-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`;

    async function init() {
      const res = await fetch(`${CabinOS.API}/checklist/items`);
      items = await res.json();

      const local = localStorage.getItem(LS_KEY);
      if (local) {
        session = JSON.parse(local);
        showChecklist();
        return;
      }

      const activeRes = await fetch(`${CabinOS.API}/checklist/sessions/active`);
      const active = await activeRes.json();
      if (active) {
        session = active;
        localStorage.setItem(LS_KEY, JSON.stringify(session));
        showChecklist();
      }
    }

    async function startSession() {
      const id = CabinOS.ulid();
      const started_at = Math.floor(Date.now() / 1000);
      const res = await CabinOS.apiFetch('/checklist/sessions', {
        method: 'POST',
        body: JSON.stringify({ id, started_at }),
      });
      session = await res.json();
      localStorage.setItem(LS_KEY, JSON.stringify(session));
      showChecklist();
    }

    function showChecklist() {
      document.getElementById('start-view').classList.add('hidden');
      document.getElementById('checklist-view').classList.remove('hidden');
      renderChecklist();
    }

    function renderItem(item) {
      const checked = session.checked_ids.includes(item.id);

      if (item.photo_prompt) {
        const photo = sessionPhotos[item.id];
        const thumbHtml = photo
          ? `<img class="photo-thumb" src="${esc(photo.url)}" alt="">`
          : '';
        const actionHtml = checked
          ? `${thumbHtml}<span class="photo-taken-badge">
               <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
               Photo saved
             </span>`
          : `<label class="photo-upload-label" id="upload-label-${item.id}">
               ${SVG_CAMERA} Take photo
               <input type="file" accept="image/*" capture="environment"
                 class="photo-file-input" data-id="${esc(item.id)}" style="display:none">
             </label>`;

        return `
          <div class="checklist-item photo-item${checked ? ' checked' : ''}" data-id="${esc(item.id)}">
            <div class="checklist-label">
              ${SVG_CAMERA}
              <span>${esc(item.label)}</span>
            </div>
            <div class="photo-prompt-text">${esc(item.photo_prompt)}</div>
            ${actionHtml}
          </div>`;
      }

      return `
        <div class="checklist-item${checked ? ' checked' : ''}" data-id="${esc(item.id)}">
          <input type="checkbox" id="item-${esc(item.id)}" ${checked ? 'checked' : ''}>
          <label for="item-${esc(item.id)}">${esc(item.label)}</label>
        </div>`;
    }

    function renderChecklist() {
      const bySection = {};
      for (const item of items) {
        (bySection[item.section] = bySection[item.section] || []).push(item);
      }

      const container = document.getElementById('checklist-sections');
      container.innerHTML = Object.entries(bySection).map(([sec, secItems]) => `
        <div class="section-label">${esc(sec)}</div>
        <div class="card">
          ${secItems.map(renderItem).join('')}
        </div>`).join('');

      // Wire regular checkboxes
      container.querySelectorAll('.checklist-item:not(.photo-item)').forEach(el => {
        el.addEventListener('click', e => {
          if (e.target.tagName === 'INPUT') return;
          const cb = el.querySelector('input[type=checkbox]');
          cb.checked = !cb.checked;
          toggleItem(el.dataset.id, cb.checked);
        });
        el.querySelector('input').addEventListener('change', e => {
          toggleItem(el.dataset.id, e.target.checked);
        });
      });

      // Wire photo file inputs
      container.querySelectorAll('.photo-file-input').forEach(input => {
        input.addEventListener('change', () => handlePhotoUpload(input));
      });

      updateProgress();
    }

    async function handlePhotoUpload(input) {
      const file = input.files[0];
      if (!file) return;
      const itemId = input.dataset.id;
      const label = document.getElementById(`upload-label-${itemId}`);
      if (label) { label.classList.add('uploading'); label.textContent = 'Uploading…'; }

      try {
        const photoId  = CabinOS.ulid();
        const taken_at = Math.floor(Date.now() / 1000);

        // Presign
        const presignRes = await CabinOS.apiFetch('/photos/presign', {
          method: 'POST',
          body: JSON.stringify({
            id: photoId,
            category_id: CHECKOUT_CATEGORY_ID,
            session_id: session.id,
            taken_at,
            content_type: file.type || 'image/jpeg',
          }),
        });
        const { upload_url, r2_key } = await presignRes.json();

        // Upload directly to R2
        await fetch(upload_url, {
          method: 'PUT',
          headers: { 'Content-Type': file.type || 'image/jpeg' },
          body: file,
        });

        // Confirm
        const confirmRes = await CabinOS.apiFetch('/photos/confirm', {
          method: 'POST',
          body: JSON.stringify({
            id: photoId,
            category_id: CHECKOUT_CATEGORY_ID,
            session_id: session.id,
            r2_key,
            taken_at,
            notes: items.find(i => i.id === itemId)?.photo_prompt ?? null,
          }),
        });
        const photo = await confirmRes.json();
        sessionPhotos[itemId] = { url: photo.url };

        // Auto-check the item and re-render
        await toggleItem(itemId, true);
        renderChecklist();
      } catch (err) {
        console.error(err);
        alert('Photo upload failed. Please try again.');
        if (label) { label.classList.remove('uploading'); label.innerHTML = `${SVG_CAMERA} Take photo`; }
      }
    }

    async function toggleItem(id, checked) {
      if (checked) {
        if (!session.checked_ids.includes(id)) session.checked_ids.push(id);
      } else {
        session.checked_ids = session.checked_ids.filter(x => x !== id);
      }
      localStorage.setItem(LS_KEY, JSON.stringify(session));
      updateProgress();
      try {
        await CabinOS.apiFetch(`/checklist/sessions/${session.id}`, {
          method: 'PATCH',
          body: JSON.stringify({ checked_ids: session.checked_ids, notes: null }),
        });
      } catch (e) { /* offline */ }
    }

    function updateProgress() {
      const total = items.length;
      const done  = session.checked_ids.length;
      const pct   = total ? Math.round(done / total * 100) : 0;
      document.getElementById('progress-fill').style.width = `${pct}%`;
      document.getElementById('progress-label').textContent = `${done} / ${total} complete`;
      document.getElementById('complete-btn').disabled = done < total;

      document.querySelectorAll('.checklist-item:not(.photo-item)').forEach(el => {
        const checked = session.checked_ids.includes(el.dataset.id);
        el.classList.toggle('checked', checked);
        const cb = el.querySelector('input');
        if (cb) cb.checked = checked;
      });
      document.querySelectorAll('.checklist-item.photo-item').forEach(el => {
        el.classList.toggle('checked', session.checked_ids.includes(el.dataset.id));
      });
    }

    async function completeSession() {
      const completed_at = Math.floor(Date.now() / 1000);
      const res = await CabinOS.apiFetch(`/checklist/sessions/${session.id}/complete`, {
        method: 'POST',
        body: JSON.stringify({ completed_at, notes: null }),
      });
      if (res.ok) {
        localStorage.removeItem(LS_KEY);
        document.getElementById('checklist-view').classList.add('hidden');
        document.getElementById('done-view').classList.remove('hidden');
      }
    }

    document.getElementById('start-btn').addEventListener('click', startSession);
    document.getElementById('complete-btn').addEventListener('click', completeSession);
    document.getElementById('abandon-btn').addEventListener('click', () => {
      localStorage.removeItem(LS_KEY);
      session = null;
      document.getElementById('checklist-view').classList.add('hidden');
      document.getElementById('start-view').classList.remove('hidden');
    });
    document.getElementById('restart-btn').addEventListener('click', () => {
      document.getElementById('done-view').classList.add('hidden');
      document.getElementById('start-view').classList.remove('hidden');
    });

    init();
  </script>
</body>
</html>
