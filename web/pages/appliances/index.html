<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appliances — Cabin OS</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .app-table { width:100%; border-collapse:collapse; background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
    .app-table thead th { padding:.6rem .75rem; text-align:left; font-size:.78rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; border-bottom:2px solid var(--tan-dark); white-space:nowrap; }
    .app-table .app-row { cursor:pointer; border-top:1px solid var(--tan-dark); }
    .app-table .app-row:hover { background:var(--tan); }
    .app-table .app-row td { padding:.65rem .75rem; font-size:.9rem; vertical-align:middle; }
    .app-table .detail-row td { padding:.75rem 1rem .75rem 2.25rem; border-top:none; background:#fafaf8; }
    .app-table .detail-row { display:none; }
    .app-table .detail-row.open { display:table-row; }
    .app-name-cell { display:flex; align-items:center; gap:.5rem; font-weight:600; color:var(--green-dark); }
    .app-name-cell svg { flex-shrink:0; color:var(--text-muted); transition:transform .2s; }
    .app-row.expanded .app-name-cell svg { transform:rotate(180deg); }
    .app-model { font-size:.85rem; color:var(--text-muted); }
    .app-icon-btn { background:none; border:none; cursor:pointer; padding:.3rem; line-height:1; color:var(--text-muted); border-radius:var(--radius); }
    .app-icon-btn:hover { background:var(--tan-dark); }
    .app-icon-btn.delete:hover { background:#f8d7da; color:#721c24; }

    .detail-section { margin-bottom:.85rem; }
    .detail-section:last-child { margin-bottom:0; }
    .detail-label { font-size:.75rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:.35rem; }

    .events-list { }
    .event-row { display:flex; align-items:flex-start; gap:.75rem; padding:.35rem 0; border-bottom:1px solid var(--tan-dark); font-size:.85rem; }
    .event-row:last-child { border-bottom:none; }
    .event-date { color:var(--text-muted); white-space:nowrap; min-width:6.5rem; }
    .event-desc { flex:1; color:var(--text); }
    .row-delete-btn { background:none; border:none; cursor:pointer; color:var(--text-muted); padding:.1rem .3rem; border-radius:var(--radius); line-height:1; font-size:.9rem; flex-shrink:0; }
    .row-delete-btn:hover { background:#f8d7da; color:#721c24; }
    .add-inline-row { display:flex; gap:.4rem; margin-top:.5rem; align-items:center; }
    .add-inline-row input[type=date] { width:9rem; }
    .add-inline-row input[type=text],
    .add-inline-row input[type=url] { flex:1; }

    .manuals-list { }
    .manual-row { display:flex; align-items:center; gap:.5rem; padding:.35rem 0; border-bottom:1px solid var(--tan-dark); font-size:.85rem; }
    .manual-row:last-child { border-bottom:none; }
    .manual-link { flex:1; color:var(--green-mid); text-decoration:none; font-weight:500; }
    .manual-link:hover { text-decoration:underline; }
    .manual-type-badge { font-size:.7rem; padding:.1rem .4rem; border-radius:99px; background:var(--tan-dark); color:var(--text-muted); white-space:nowrap; }
    .manual-add-btns { display:flex; gap:.4rem; margin-top:.5rem; }
    .upload-progress { font-size:.82rem; color:var(--text-muted); margin-top:.35rem; display:none; }

    .notes-md { font-size:.88rem; color:var(--text-muted); }
    .notes-md p { margin:.25rem 0; }
    .notes-md p:first-child { margin-top:0; }
    .notes-md ul { margin:.25rem 0 .25rem 1.25rem; padding:0; }
    .notes-md li { margin:.15rem 0; }
    .notes-md strong { color:var(--text); }
    .notes-md h1,.notes-md h2,.notes-md h3 { font-size:.88rem; font-weight:700; color:var(--text); margin:.4rem 0 .15rem; }

    .modal-card {
      background:#fff; border-radius:var(--radius);
      box-shadow:0 8px 32px rgba(0,0,0,.2);
      width:100%; max-width:480px;
      padding:1.5rem;
    }
    .modal-card h2 { margin-bottom:1rem; color:var(--green-dark); }
    .modal-card .form-row { margin-bottom:.6rem; }
    .modal-card label { display:block; font-size:.82rem; font-weight:600; margin-bottom:.25rem; color:var(--text-muted); }
    .modal-actions { display:flex; gap:.5rem; margin-top:1rem; }
  </style>
</head>
<body>
  <nav id="nav">
    <a href="/" class="nav-brand">Cabin OS</a>
    <div class="nav-links">
      <a href="/pages/wiki/">Wiki</a>
      <a href="/pages/checklists/">Checklists</a>
      <a href="/pages/photos/">Photos</a>
      <a href="/pages/contacts/">Contacts</a>
      <a href="/pages/businesses/">Businesses</a>
      <a href="/pages/appliances/">Appliances</a>
      <a href="/pages/settings/">Settings</a>
    </div>
  </nav>
  <main>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <h1 class="page-title" style="margin-bottom:0">Appliances</h1>
      <button class="btn btn-primary" id="add-btn">+ Add</button>
    </div>
    <div id="appliance-list"><p class="muted">Loading…</p></div>
  </main>

  <!-- Add/edit appliance modal -->
  <div id="add-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2 id="modal-title">Add appliance</h2>
      <form id="add-form" autocomplete="off">
        <div class="form-row">
          <label>Name *</label>
          <input type="text" id="app-name" required data-1p-ignore autocomplete="off">
        </div>
        <div class="form-row">
          <label>Model</label>
          <input type="text" id="app-model" placeholder="Make / model number" data-1p-ignore autocomplete="off">
        </div>
        <div class="form-row">
          <label>Notes</label>
          <textarea id="app-notes" style="min-height:80px"></textarea>
        </div>
        <p id="add-error" class="error hidden"></p>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" class="btn btn-secondary" id="cancel-btn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add link modal -->
  <div id="link-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2>Add manual link</h2>
      <form id="link-form" autocomplete="off">
        <div class="form-row">
          <label>Label *</label>
          <input type="text" id="link-name" placeholder="e.g. Owner's Manual" required data-1p-ignore autocomplete="off">
        </div>
        <div class="form-row">
          <label>URL *</label>
          <input type="url" id="link-url" placeholder="https://…" required data-1p-ignore autocomplete="off">
        </div>
        <p id="link-error" class="error hidden"></p>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" class="btn btn-secondary" id="link-cancel-btn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/assets/app.js" type="module"></script>
  <script type="module">
    function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    let allAppliances = [];

    function renderDetail(appliance) {
      const events  = appliance.events  || [];
      const manuals = appliance.manuals || [];

      const manualsHtml = `
        <div class="detail-section">
          <div class="detail-label">Manuals</div>
          <div class="manuals-list" data-id="${esc(appliance.id)}">
            ${manuals.length ? manuals.map(m => `
              <div class="manual-row" data-manual-id="${esc(m.id)}">
                <a class="manual-link" href="${esc(m.url)}" target="_blank" rel="noopener">
                  ${esc(m.name)}
                </a>
                <span class="manual-type-badge">${m.r2_key ? 'PDF' : 'Link'}</span>
                <button class="row-delete-btn manual-delete-btn"
                  data-manual-id="${esc(m.id)}" data-appliance-id="${esc(appliance.id)}"
                  title="Remove">×</button>
              </div>`) .join('') : '<div style="font-size:.85rem;color:var(--text-muted)">No manuals yet.</div>'}
          </div>
          <div class="manual-add-btns">
            <button type="button" class="btn btn-secondary add-link-btn" data-id="${esc(appliance.id)}" style="font-size:.82rem;padding:.3rem .7rem">+ Link</button>
            <label class="btn btn-secondary" style="font-size:.82rem;padding:.3rem .7rem;cursor:pointer;margin:0">
              + PDF
              <input type="file" accept="application/pdf" class="pdf-upload-input" data-id="${esc(appliance.id)}" style="display:none">
            </label>
            <span class="upload-progress" data-id="${esc(appliance.id)}">Uploading…</span>
          </div>
        </div>`;

      const eventsHtml = `
        <div class="detail-section">
          <div class="detail-label">Event log</div>
          <div class="events-list">
            ${events.length ? events.map(ev => `
              <div class="event-row">
                <span class="event-date">${esc(ev.date)}</span>
                <span class="event-desc">${esc(ev.description)}</span>
                <button class="row-delete-btn event-delete-btn"
                  data-event-id="${esc(ev.id)}" data-appliance-id="${esc(appliance.id)}"
                  title="Delete">×</button>
              </div>`).join('') : '<div style="font-size:.85rem;color:var(--text-muted)">No events yet.</div>'}
          </div>
          <div class="add-inline-row">
            <input type="date" class="new-event-date" data-id="${esc(appliance.id)}" data-1p-ignore autocomplete="off">
            <input type="text" class="new-event-desc" placeholder="Description" data-id="${esc(appliance.id)}" data-1p-ignore autocomplete="off">
            <button type="button" class="btn btn-secondary add-event-btn" data-id="${esc(appliance.id)}" style="white-space:nowrap">+ Log</button>
          </div>
        </div>`;

      return `
        ${appliance.notes ? `<div class="detail-section notes-md">${CabinOS.renderMarkdown(appliance.notes)}</div>` : ''}
        ${appliance.model ? `<div style="font-size:.82rem;color:var(--text-muted);margin-bottom:.75rem">Model: ${esc(appliance.model)}</div>` : ''}
        ${manualsHtml}
        ${eventsHtml}`;
    }

    function renderList() {
      const container = document.getElementById('appliance-list');
      if (!allAppliances.length) {
        container.innerHTML = '<p class="muted">No appliances yet. Tap + Add to get started.</p>';
        return;
      }

      // Remember which rows were open before re-render
      const openIds = new Set(
        [...container.querySelectorAll('.detail-row.open')].map(r => r.dataset.id)
      );

      const rows = allAppliances.map(a => `
        <tr class="app-row${openIds.has(a.id) ? ' expanded' : ''}" data-id="${esc(a.id)}">
          <td><div class="app-name-cell">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,6 8,10 12,6"/></svg>
            ${esc(a.name)}
          </div></td>
          <td class="app-model">${esc(a.model)}</td>
          <td style="white-space:nowrap">
            <button class="app-icon-btn edit-app-btn" data-id="${esc(a.id)}" title="Edit">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="app-icon-btn delete delete-app-btn" data-id="${esc(a.id)}" title="Delete">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
          </td>
        </tr>
        <tr class="detail-row${openIds.has(a.id) ? ' open' : ''}" data-id="${esc(a.id)}">
          <td colspan="3">${renderDetail(a)}</td>
        </tr>`).join('');

      container.innerHTML = `
        <table class="app-table">
          <thead><tr><th>Name</th><th>Model</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;

      // Row expand/collapse
      container.querySelectorAll('.app-row').forEach(row => {
        row.addEventListener('click', e => {
          if (e.target.closest('.app-icon-btn')) return;
          const detail = container.querySelector(`.detail-row[data-id="${row.dataset.id}"]`);
          row.classList.toggle('expanded');
          detail?.classList.toggle('open');
        });
      });

      // Delete appliance
      container.querySelectorAll('.delete-app-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Delete this appliance and all its data?')) return;
          await CabinOS.apiFetch(`/appliances/${btn.dataset.id}`, { method: 'DELETE' });
          load();
        });
      });

      // Edit appliance
      container.querySelectorAll('.edit-app-btn').forEach(btn => {
        btn.addEventListener('click', () => openModal(btn.dataset.id));
      });

      // Log event
      container.querySelectorAll('.add-event-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          const dateInput = container.querySelector(`.new-event-date[data-id="${id}"]`);
          const descInput = container.querySelector(`.new-event-desc[data-id="${id}"]`);
          const date = dateInput.value.trim();
          const description = descInput.value.trim();
          if (!date || !description) return;
          await CabinOS.apiFetch(`/appliances/${id}/events`, {
            method: 'POST',
            body: JSON.stringify({ id: CabinOS.ulid(), date, description }),
          });
          load();
        });
      });

      // Delete event
      container.querySelectorAll('.event-delete-btn').forEach(btn => {
        btn.addEventListener('click', async e => {
          e.stopPropagation();
          await CabinOS.apiFetch(`/appliances/${btn.dataset.applianceId}/events/${btn.dataset.eventId}`, { method: 'DELETE' });
          load();
        });
      });

      // Add link manual
      container.querySelectorAll('.add-link-btn').forEach(btn => {
        btn.addEventListener('click', () => openLinkModal(btn.dataset.id));
      });

      // Delete manual
      container.querySelectorAll('.manual-delete-btn').forEach(btn => {
        btn.addEventListener('click', async e => {
          e.stopPropagation();
          if (!confirm('Remove this manual?')) return;
          await CabinOS.apiFetch(`/appliances/${btn.dataset.applianceId}/manuals/${btn.dataset.manualId}`, { method: 'DELETE' });
          load();
        });
      });

      // Upload PDF
      container.querySelectorAll('.pdf-upload-input').forEach(input => {
        input.addEventListener('change', async e => {
          e.stopPropagation();
          const file = input.files[0];
          if (!file) return;
          const appId = input.dataset.id;
          const manualId = CabinOS.ulid();
          const name = file.name.replace(/\.pdf$/i, '').replace(/[-_]/g, ' ');
          const progress = container.querySelector(`.upload-progress[data-id="${appId}"]`);
          progress.style.display = 'inline';

          try {
            // 1. Presign
            const presignRes = await CabinOS.apiFetch(`/appliances/${appId}/manuals/presign`, {
              method: 'POST',
              body: JSON.stringify({ id: manualId, name }),
            });
            const { upload_url, r2_key } = await presignRes.json();

            // 2. Upload directly to R2
            await fetch(upload_url, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/pdf' },
              body: file,
            });

            // 3. Confirm
            await CabinOS.apiFetch(`/appliances/${appId}/manuals/confirm`, {
              method: 'POST',
              body: JSON.stringify({ id: manualId, name, r2_key }),
            });

            load();
          } catch (err) {
            alert('Upload failed. Please try again.');
            console.error(err);
          } finally {
            progress.style.display = 'none';
            input.value = '';
          }
        });
      });
    }

    async function load() {
      const res = await fetch(`${CabinOS.API}/appliances`);
      allAppliances = await res.json();
      renderList();
    }

    // ── Appliance modal ──
    let editingId = null;

    async function openModal(id = null) {
      editingId = id;
      document.getElementById('modal-title').textContent = id ? 'Edit appliance' : 'Add appliance';
      document.getElementById('add-form').reset();
      document.getElementById('add-error').classList.add('hidden');
      if (id) {
        const a = allAppliances.find(x => x.id === id);
        if (a) {
          document.getElementById('app-name').value  = a.name  || '';
          document.getElementById('app-model').value = a.model || '';
          document.getElementById('app-notes').value = a.notes || '';
        }
      }
      document.getElementById('add-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('add-modal').classList.add('hidden');
      editingId = null;
    }

    document.getElementById('add-btn').addEventListener('click', () => openModal());
    document.getElementById('cancel-btn').addEventListener('click', closeModal);
    document.getElementById('add-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('add-modal')) closeModal();
    });

    document.getElementById('add-form').addEventListener('submit', async e => {
      e.preventDefault();
      const errEl = document.getElementById('add-error');
      errEl.classList.add('hidden');
      const payload = {
        name:  document.getElementById('app-name').value.trim(),
        model: document.getElementById('app-model').value.trim(),
        notes: document.getElementById('app-notes').value.trim(),
        sort_order: 0,
      };
      const res = editingId
        ? await CabinOS.apiFetch(`/appliances/${editingId}`, { method: 'PUT', body: JSON.stringify(payload) })
        : await CabinOS.apiFetch('/appliances', { method: 'POST', body: JSON.stringify({ id: CabinOS.ulid(), ...payload }) });
      if (res.ok) { closeModal(); load(); }
      else {
        const body = await res.json().catch(() => ({}));
        errEl.textContent = body.error || 'Save failed.';
        errEl.classList.remove('hidden');
      }
    });

    // ── Link manual modal ──
    let linkTargetId = null;

    function openLinkModal(applianceId) {
      linkTargetId = applianceId;
      document.getElementById('link-form').reset();
      document.getElementById('link-error').classList.add('hidden');
      document.getElementById('link-modal').classList.remove('hidden');
    }

    function closeLinkModal() {
      document.getElementById('link-modal').classList.add('hidden');
      linkTargetId = null;
    }

    document.getElementById('link-cancel-btn').addEventListener('click', closeLinkModal);
    document.getElementById('link-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('link-modal')) closeLinkModal();
    });

    document.getElementById('link-form').addEventListener('submit', async e => {
      e.preventDefault();
      const errEl = document.getElementById('link-error');
      errEl.classList.add('hidden');
      const payload = {
        id:   CabinOS.ulid(),
        name: document.getElementById('link-name').value.trim(),
        url:  document.getElementById('link-url').value.trim(),
      };
      const res = await CabinOS.apiFetch(`/appliances/${linkTargetId}/manuals`, {
        method: 'POST',
        body: JSON.stringify(payload),
      });
      if (res.ok) { closeLinkModal(); load(); }
      else {
        const body = await res.json().catch(() => ({}));
        errEl.textContent = body.error || 'Save failed.';
        errEl.classList.remove('hidden');
      }
    });

    load();
  </script>
</body>
</html>
