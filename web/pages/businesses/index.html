<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Businesses — Cabin OS</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .biz-table { width:100%; border-collapse:collapse; background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
    .biz-table thead th { padding:.6rem .75rem; text-align:left; font-size:.78rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; border-bottom:2px solid var(--tan-dark); white-space:nowrap; }
    .biz-table .biz-row { cursor:pointer; border-top:1px solid var(--tan-dark); }
    .biz-table .biz-row:hover { background:var(--tan); }
    .biz-table .biz-row td { padding:.65rem .75rem; font-size:.9rem; vertical-align:middle; }
    .biz-table .cat-row td { padding:.4rem .75rem; font-size:.75rem; font-weight:700; color:var(--green-light); text-transform:uppercase; letter-spacing:.05em; background:var(--tan); border-top:1px solid var(--tan-dark); }
    .biz-table .detail-row td { padding:.75rem 1rem .75rem 2.25rem; border-top:none; background:#fafaf8; }
    .biz-table .detail-row { display:none; }
    .biz-table .detail-row.open { display:table-row; }
    .biz-name-cell { display:flex; align-items:center; gap:.5rem; font-weight:600; color:var(--green-dark); }
    .biz-name-cell svg { flex-shrink:0; color:var(--text-muted); transition:transform .2s; }
    .biz-row.expanded .biz-name-cell svg { transform:rotate(180deg); }
    .open-badge { display:inline-block; padding:.15rem .55rem; border-radius:99px; font-size:.75rem; font-weight:700; white-space:nowrap; }
    .open-badge.open   { background:#d4edda; color:#155724; }
    .open-badge.closed { background:#f8d7da; color:#721c24; }
    .biz-icon-btn { background:none; border:none; cursor:pointer; padding:.3rem; line-height:1; color:var(--text-muted); border-radius:var(--radius); }
    .biz-icon-btn:hover { background:var(--tan-dark); }
    .biz-icon-btn.delete:hover { background:#f8d7da; color:#721c24; }
    .hours-grid { display:grid; grid-template-columns:auto 1fr; gap:.2rem .75rem; font-size:.85rem; margin-top:.5rem; }
    .hours-day { color:var(--text-muted); }
    .hours-time { color:var(--text); }
    .hours-time.today { font-weight:700; color:var(--green-dark); }
    .business-meta { display:flex; flex-wrap:wrap; gap:.35rem .75rem; margin-bottom:.5rem; }
    .business-meta a { font-size:.85rem; color:var(--green-mid); text-decoration:none; }
    .business-meta a:hover { text-decoration:underline; }
    .closed-months-note { font-size:.82rem; color:#721c24; margin-top:.5rem; }

    .tag { display:inline-block; padding:.15rem .55rem; border-radius:99px; font-size:.75rem; font-weight:600; background:var(--tan-dark); color:var(--text-muted); margin:.1rem .15rem 0 0; }
    #filter-bar { display:flex; flex-direction:column; gap:.5rem; margin-bottom:1rem; }
    #filter-search {
      width:100%; padding:.55rem .75rem; border:1px solid var(--tan-dark);
      border-radius:var(--radius); font-size:.95rem; background:#fff;
    }
    #filter-chips { display:flex; flex-wrap:wrap; gap:.4rem; }
    .filter-chip {
      padding:.3rem .75rem; border-radius:99px; border:1.5px solid var(--tan-dark);
      font-size:.82rem; font-weight:600; cursor:pointer; background:#fff; color:var(--text-muted);
    }
    .filter-chip.active { background:var(--green-mid); color:#fff; border-color:var(--green-mid); }
    .tag-input-wrap { display:flex; flex-wrap:wrap; gap:.35rem; align-items:center; padding:.4rem .5rem; border:1px solid var(--tan-dark); border-radius:var(--radius); background:#fff; min-height:38px; cursor:text; }
    .tag-pill { display:flex; align-items:center; gap:.3rem; padding:.15rem .55rem; border-radius:99px; background:var(--green-mid); color:#fff; font-size:.8rem; font-weight:600; }
    .tag-pill button { background:none; border:none; color:#fff; cursor:pointer; font-size:.9rem; line-height:1; padding:0; }
    .tag-input-wrap input { border:none; outline:none; font-size:.85rem; flex:1; min-width:80px; background:transparent; }

    /* Add form modal */
    .add-modal-card {
      background:#fff; border-radius:var(--radius);
      box-shadow:0 8px 32px rgba(0,0,0,.2);
      width:100%; max-width:520px;
      max-height:90dvh; overflow-y:auto;
      padding:1.5rem;
    }
    .add-modal-card h2 { margin-bottom:1rem; color:var(--green-dark); }
    .add-modal-card .form-row { margin-bottom:.6rem; }
    .add-modal-card label { display:block; font-size:.82rem; font-weight:600; margin-bottom:.25rem; color:var(--text-muted); }
    .hours-form-grid {
      display:grid; grid-template-columns: 6rem 1fr 1fr;
      gap:.3rem .5rem; align-items:center; font-size:.85rem; margin-bottom:.75rem;
    }
    .hours-form-grid span { color:var(--text-muted); }
    .hours-form-grid input[type=time] { padding:.3rem .5rem; font-size:.85rem; }
    .months-grid { display:flex; flex-wrap:wrap; gap:.35rem; margin-bottom:.75rem; }
    .month-chip {
      padding:.25rem .6rem; border-radius:99px; border:1.5px solid var(--tan-dark);
      font-size:.8rem; cursor:pointer; user-select:none; background:#fff;
    }
    .month-chip.selected { background:var(--green-mid); color:#fff; border-color:var(--green-mid); }
    .modal-actions { display:flex; gap:.5rem; margin-top:1rem; }
  </style>
</head>
<body>
  <nav id="nav">
    <a href="/" class="nav-brand">Cabin OS</a>
    <div class="nav-links">
      <a href="/pages/wiki/">Wiki</a>
      <a href="/pages/shutdown/">Shutdown</a>
      <a href="/pages/photos/">Photos</a>
      <a href="/pages/contacts/">Contacts</a>
      <a href="/pages/businesses/">Businesses</a>
      <a href="/pages/settings/">Settings</a>
    </div>
  </nav>
  <main>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <h1 class="page-title" style="margin-bottom:0">Businesses</h1>
      <button class="btn btn-primary" id="add-btn">+ Add</button>
    </div>
    <div id="filter-bar">
      <input id="filter-search" type="search" placeholder="Search businesses…">
      <div id="filter-chips"></div>
    </div>
    <div id="business-list"><p class="muted">Loading…</p></div>
  </main>

  <!-- Add business modal -->
  <div id="add-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="add-modal-card">
      <h2 id="modal-title">Add business</h2>
      <form id="add-business-form">
        <div class="form-row">
          <label>Name *</label>
          <input type="text" id="biz-name" required>
        </div>
        <div class="form-row">
          <label>Category</label>
          <input type="text" id="biz-category" placeholder="e.g. Food, Hardware, Services">
        </div>
        <div class="form-row">
          <label>Description</label>
          <textarea id="biz-description" style="min-height:60px"></textarea>
        </div>
        <div class="form-row">
          <label>Address</label>
          <input type="text" id="biz-address">
        </div>
        <div class="form-row">
          <label>Phone</label>
          <input type="tel" id="biz-phone">
        </div>
        <div class="form-row">
          <label>Website</label>
          <input type="url" id="biz-website" placeholder="https://…">
        </div>

        <div class="form-row">
          <label>Tags <span style="font-weight:400">(press Enter or comma to add)</span></label>
          <div class="tag-input-wrap" id="tag-input-wrap">
            <input type="text" id="tag-input" placeholder="e.g. wifi, dog-friendly">
          </div>
        </div>

        <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:.4rem;color:var(--text-muted)">
          Hours <span style="font-weight:400">(leave blank = closed that day)</span>
        </label>
        <div class="hours-form-grid" id="hours-form"></div>

        <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:.4rem;color:var(--text-muted)">Closed months</label>
        <div class="months-grid" id="months-form"></div>

        <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:.4rem;color:var(--text-muted)">Closure dates</label>
        <div style="display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem">
          <input type="date" id="closure-date-input" style="flex:1">
          <button type="button" class="btn btn-secondary" id="add-closure-btn">Add</button>
        </div>
        <div id="closure-list" style="display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.75rem"></div>

        <p id="add-error" class="error hidden"></p>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" class="btn btn-secondary" id="cancel-btn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/assets/app.js" type="module"></script>
  <script type="module">
    const DAYS        = ['sun','mon','tue','wed','thu','fri','sat'];
    const DAY_LABELS  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    function nowCT() {
      const ct = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Chicago' }));
      return {
        month: ct.getMonth() + 1,
        dow: ct.getDay(),
        minuteOfDay: ct.getHours() * 60 + ct.getMinutes(),
      };
    }
    function parseTime(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
    function fmt12(t) {
      const [h,m] = t.split(':').map(Number);
      const h12 = h%12||12, ampm = h>=12?'pm':'am';
      return m===0 ? `${h12}${ampm}` : `${h12}:${String(m).padStart(2,'0')}${ampm}`;
    }
    function todayStr() {
      const ct = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Chicago' }));
      return `${ct.getFullYear()}-${String(ct.getMonth()+1).padStart(2,'0')}-${String(ct.getDate()).padStart(2,'0')}`;
    }
    function isOpenNow(hours, closedMonths, closures = []) {
      const now = nowCT();
      if (closures.includes(todayStr())) return 'closed';
      if (closedMonths.includes(now.month)) return 'closed';
      const slot = hours[DAYS[now.dow]];
      if (!slot) return 'closed';
      return now.minuteOfDay >= parseTime(slot.open) && now.minuteOfDay < parseTime(slot.close) ? 'open' : 'closed';
    }
    function mapsUrl(a) { return 'https://maps.google.com/?q=' + encodeURIComponent(a); }
    function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ── Tags input ──
    let currentTags = [];
    function renderTagPills() {
      const wrap = document.getElementById('tag-input-wrap');
      wrap.querySelectorAll('.tag-pill').forEach(p => p.remove());
      currentTags.forEach(tag => {
        const pill = document.createElement('span');
        pill.className = 'tag-pill';
        pill.innerHTML = `${esc(tag)}<button type="button" data-tag="${esc(tag)}">×</button>`;
        pill.querySelector('button').addEventListener('click', () => { currentTags = currentTags.filter(t => t !== tag); renderTagPills(); });
        wrap.insertBefore(pill, document.getElementById('tag-input'));
      });
    }
    function addTag(raw) {
      const tag = raw.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
      if (tag && !currentTags.includes(tag)) { currentTags.push(tag); renderTagPills(); }
    }
    document.getElementById('tag-input-wrap').addEventListener('click', () => document.getElementById('tag-input').focus());
    document.getElementById('tag-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        addTag(e.target.value);
        e.target.value = '';
      } else if (e.key === 'Backspace' && !e.target.value && currentTags.length) {
        currentTags.pop();
        renderTagPills();
      }
    });
    document.getElementById('tag-input').addEventListener('blur', e => {
      if (e.target.value.trim()) { addTag(e.target.value); e.target.value = ''; }
    });

    // ── Filter ──
    let activeFilter = null;
    let filterOpenNow = localStorage.getItem('biz_open_now') === 'true';
    let searchQuery = '';

    document.getElementById('filter-search').addEventListener('input', e => {
      searchQuery = e.target.value.toLowerCase();
      if (window._allBusinesses) renderList(window._allBusinesses);
    });

    function buildFilterChips(businesses) {
      const allTags = [...new Set(businesses.flatMap(b => b.tags || []))].sort();
      const chips = document.getElementById('filter-chips');
      chips.innerHTML = '';

      const openChip = document.createElement('button');
      openChip.className = 'filter-chip' + (filterOpenNow ? ' active' : '');
      openChip.textContent = 'Open now';
      openChip.addEventListener('click', () => {
        filterOpenNow = !filterOpenNow;
        localStorage.setItem('biz_open_now', filterOpenNow);
        buildFilterChips(businesses);
        renderList(businesses);
      });
      chips.appendChild(openChip);

      allTags.forEach(tag => {
        const chip = document.createElement('button');
        chip.className = 'filter-chip' + (activeFilter === tag ? ' active' : '');
        chip.textContent = tag;
        chip.addEventListener('click', () => {
          activeFilter = activeFilter === tag ? null : tag;
          buildFilterChips(businesses);
          renderList(businesses);
        });
        chips.appendChild(chip);
      });
    }

    function renderList(businesses) {
      let filtered = businesses;
      if (searchQuery) filtered = filtered.filter(b =>
        b.name.toLowerCase().includes(searchQuery) ||
        (b.category || '').toLowerCase().includes(searchQuery) ||
        (b.description || '').toLowerCase().includes(searchQuery)
      );
      if (filterOpenNow) filtered = filtered.filter(b => isOpenNow(b.hours || {}, b.closed_months || [], b.closures || []) === 'open');
      if (activeFilter)  filtered = filtered.filter(b => (b.tags || []).includes(activeFilter));
      const container = document.getElementById('business-list');
      if (!filtered.length) { container.innerHTML = '<p class="muted">No businesses match.</p>'; return; }
      const byCategory = {};
      for (const b of filtered) (byCategory[b.category] = byCategory[b.category] || []).push(b);
      const rows = Object.entries(byCategory).flatMap(([cat, items]) => {
        const sorted = items.sort((a, b) => a.name.localeCompare(b.name));
        return [
          cat ? `<tr class="cat-row"><td colspan="5">${esc(cat)}</td></tr>` : '',
          ...sorted.map(renderBusiness),
        ];
      });
      container.innerHTML = `
        <table class="biz-table">
          <thead><tr>
            <th>Name</th><th>Status</th><th>Phone</th><th>Website</th><th></th>
          </tr></thead>
          <tbody>${rows.join('')}</tbody>
        </table>`;
      container.querySelectorAll('.biz-row').forEach(row => {
        row.addEventListener('click', e => {
          if (e.target.closest('.biz-icon-btn')) return;
          const detail = container.querySelector(`.detail-row[data-id="${row.dataset.id}"]`);
          row.classList.toggle('expanded');
          detail?.classList.toggle('open');
        });
      });
      container.querySelectorAll('.delete-biz-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Delete this business?')) return;
          await CabinOS.apiFetch(`/businesses/${btn.dataset.id}`, { method: 'DELETE' });
          load();
        });
      });
      container.querySelectorAll('.edit-biz-btn').forEach(btn => {
        btn.addEventListener('click', () => openModal(btn.dataset.id));
      });
    }

    function renderBusiness(b) {
      const hours = b.hours || {}, closedMonths = b.closed_months || [], closures = b.closures || [];
      const hasHoursData = Object.keys(hours).length || closedMonths.length || closures.length;
      const status = hasHoursData ? isOpenNow(hours, closedMonths, closures) : null;
      const now = nowCT();

      const meta = [];
      if (b.address) meta.push(`<a href="${esc(mapsUrl(b.address))}" target="_blank" rel="noopener">Directions</a>`);

      const hoursRows = DAYS.map((d,i) => {
        const slot = hours[d], isToday = i === now.dow;
        return slot
          ? `<span class="hours-day">${DAY_LABELS[i]}</span><span class="hours-time${isToday?' today':''}">${fmt12(slot.open)} – ${fmt12(slot.close)}</span>`
          : `<span class="hours-day">${DAY_LABELS[i]}</span><span class="hours-time${isToday?' today':''}">Closed</span>`;
      }).join('');

      const hasDetails = Object.keys(hours).length || closedMonths.length || closures.length || b.description || b.address || (b.tags||[]).length;
      const chevron = hasDetails
        ? `<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,6 8,10 12,6"/></svg>`
        : '';

      return `
        <tr class="biz-row" data-id="${b.id}">
          <td><div class="biz-name-cell">${chevron}${esc(b.name)}</div></td>
          <td>${status ? `<span class="open-badge ${status}">${status === 'open' ? 'Open' : 'Closed'}</span>` : ''}</td>
          <td>${b.phone ? `<a href="tel:${esc(b.phone)}" onclick="event.stopPropagation()">${esc(b.phone)}</a>` : ''}</td>
          <td>${b.website ? `<a href="${esc(b.website)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Website</a>` : ''}</td>
          <td style="white-space:nowrap">
            <button class="biz-icon-btn edit-biz-btn" data-id="${b.id}" title="Edit">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="biz-icon-btn delete delete-biz-btn" data-id="${b.id}" title="Delete">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
          </td>
        </tr>
        ${hasDetails ? `<tr class="detail-row" data-id="${b.id}"><td colspan="5">
          ${b.description ? `<div style="font-size:.88rem;color:var(--text-muted);margin-bottom:.5rem">${esc(b.description)}</div>` : ''}
          ${(b.tags||[]).length ? `<div style="margin-bottom:.5rem">${b.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
          ${meta.length ? `<div class="business-meta" style="margin-bottom:.5rem">${meta.join('')}</div>` : ''}
          ${Object.keys(hours).length ? `<div class="hours-grid">${hoursRows}</div>` : ''}
          ${closedMonths.length ? `<div class="closed-months-note">Closed in: ${closedMonths.map(m=>MONTH_NAMES[m-1]).join(', ')}</div>` : ''}
          ${closures.length ? `<div class="closed-months-note">Closed dates: ${closures.sort().join(', ')}</div>` : ''}
        </td></tr>` : ''}`;
    }

    async function load() {
      const res = await fetch(`${CabinOS.API}/businesses`);
      const businesses = await res.json();
      window._allBusinesses = businesses;
      if (!businesses.length) {
        document.getElementById('business-list').innerHTML = '<p class="muted">No businesses yet. Tap + Add to get started.</p>';
        return;
      }
      buildFilterChips(businesses);
      renderList(businesses);
    }

    // ── Hours form ──
    const hoursForm = document.getElementById('hours-form');
    hoursForm.innerHTML = `<span></span><span style="font-size:.8rem;color:var(--text-muted)">Opens</span><span style="font-size:.8rem;color:var(--text-muted)">Closes</span>` +
      DAYS.map((d,i) => `
        <span style="color:var(--text-muted)">${DAY_LABELS[i]}</span>
        <input type="time" id="h-open-${d}">
        <input type="time" id="h-close-${d}">`).join('');

    function readHours() {
      const hours = {};
      DAYS.forEach(d => {
        const open = document.getElementById(`h-open-${d}`).value;
        const close = document.getElementById(`h-close-${d}`).value;
        if (open && close) hours[d] = { open, close };
      });
      return hours;
    }
    function resetHours() { DAYS.forEach(d => { document.getElementById(`h-open-${d}`).value=''; document.getElementById(`h-close-${d}`).value=''; }); }

    // ── Months form ──
    const monthsForm = document.getElementById('months-form');
    MONTH_NAMES.forEach((m,i) => {
      const chip = document.createElement('span');
      chip.className = 'month-chip';
      chip.textContent = m.slice(0,3);
      chip.dataset.month = i+1;
      chip.addEventListener('click', () => chip.classList.toggle('selected'));
      monthsForm.appendChild(chip);
    });
    function readClosedMonths() { return Array.from(document.querySelectorAll('.month-chip.selected')).map(c=>Number(c.dataset.month)); }
    function resetMonths() { document.querySelectorAll('.month-chip').forEach(c=>c.classList.remove('selected')); }

    // ── Closures ──
    let currentClosures = [];
    function renderClosureList() {
      const el = document.getElementById('closure-list');
      el.innerHTML = currentClosures.sort().map(d =>
        `<span class="tag-pill">${esc(d)}<button type="button" data-date="${esc(d)}">×</button></span>`
      ).join('');
      el.querySelectorAll('button[data-date]').forEach(btn =>
        btn.addEventListener('click', () => { currentClosures = currentClosures.filter(d => d !== btn.dataset.date); renderClosureList(); })
      );
    }
    document.getElementById('add-closure-btn').addEventListener('click', () => {
      const val = document.getElementById('closure-date-input').value;
      if (val && !currentClosures.includes(val)) { currentClosures.push(val); renderClosureList(); }
      document.getElementById('closure-date-input').value = '';
    });
    function resetClosures() { currentClosures = []; renderClosureList(); }

    // ── Modal open/close ──
    let editingId = null;

    async function openModal(id = null) {
      editingId = id;
      document.getElementById('modal-title').textContent = id ? 'Edit business' : 'Add business';
      document.getElementById('add-business-form').reset();
      resetHours();
      resetMonths();
      resetClosures();
      currentTags = [];
      renderTagPills();
      document.getElementById('add-error').classList.add('hidden');

      if (id) {
        const res = await CabinOS.apiFetch(`/businesses/${id}`);
        const b = await res.json();
        document.getElementById('biz-name').value        = b.name || '';
        document.getElementById('biz-category').value    = b.category || '';
        document.getElementById('biz-description').value = b.description || '';
        document.getElementById('biz-address').value     = b.address || '';
        document.getElementById('biz-phone').value       = b.phone || '';
        document.getElementById('biz-website').value     = b.website || '';
        const hours = b.hours || {};
        DAYS.forEach(d => {
          if (hours[d]) {
            document.getElementById(`h-open-${d}`).value  = hours[d].open;
            document.getElementById(`h-close-${d}`).value = hours[d].close;
          }
        });
        (b.closed_months || []).forEach(m => {
          document.querySelector(`.month-chip[data-month="${m}"]`)?.classList.add('selected');
        });
        currentTags = [...(b.tags || [])];
        renderTagPills();
        currentClosures = [...(b.closures || [])];
        renderClosureList();
      }

      document.getElementById('add-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('add-modal').classList.add('hidden');
      editingId = null;
      currentTags = [];
      currentClosures = [];
    }

    document.getElementById('add-btn').addEventListener('click', () => openModal());
    document.getElementById('cancel-btn').addEventListener('click', closeModal);
    document.getElementById('add-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('add-modal')) closeModal();
    });

    // ── Submit ──
    document.getElementById('add-business-form').addEventListener('submit', async e => {
      e.preventDefault();
      const errEl = document.getElementById('add-error');
      errEl.classList.add('hidden');
      if (document.getElementById('tag-input').value.trim()) {
        addTag(document.getElementById('tag-input').value);
        document.getElementById('tag-input').value = '';
      }
      const payload = {
        name: document.getElementById('biz-name').value.trim(),
        category: document.getElementById('biz-category').value.trim(),
        description: document.getElementById('biz-description').value.trim(),
        address: document.getElementById('biz-address').value.trim(),
        phone: document.getElementById('biz-phone').value.trim(),
        website: document.getElementById('biz-website').value.trim(),
        hours: readHours(),
        closed_months: readClosedMonths(),
        tags: [...currentTags],
        closures: [...currentClosures],
        sort_order: 0,
      };
      const res = editingId
        ? await CabinOS.apiFetch(`/businesses/${editingId}`, { method: 'PUT', body: JSON.stringify(payload) })
        : await CabinOS.apiFetch('/businesses', { method: 'POST', body: JSON.stringify({ id: CabinOS.ulid(), ...payload }) });
      if (res.ok) {
        closeModal();
        load();
      } else {
        const body = await res.json().catch(() => ({}));
        errEl.textContent = body.error || 'Save failed.';
        errEl.classList.remove('hidden');
      }
    });

    load();
  </script>
</body>
</html>
